<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BallotBox-Voting Portal</title>
    <link href="output.css" rel="stylesheet"> <!-- Tailwind CSS Output File -->
</head>
<body class="bg-gray-900 text-gray-100">

    <!-- Navbar -->
    <header class="bg-gradient-to-r from-blue-700 to-purple-600 text-white p-5 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-extrabold tracking-wide">BallotBox</h1>
            <nav>
                <ul class="flex space-x-4 text-lg">
                    <li><a href="#" class="hover:underline">Home</a></li>
                    <li><a href="#" class="hover:underline">Results</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Section -->
    <section class="text-center py-16 bg-gradient-to-br from-gray-800 to-gray-900">
        <h2 class="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
            Your Vote, Your Future
        </h2>
        <p class="text-lg mt-3 text-gray-400">Be a responsible citizen. Cast your vote now!</p>
        <button class="mt-6 px-8 py-3 text-lg font-semibold bg-blue-600 hover:bg-blue-700 transition-all duration-300 rounded-full shadow-lg">
            Vote Now
        </button>
    </section>

    <!-- Candidates Section -->
    <section class="container mx-auto py-14">
        <h2 class="text-4xl font-bold text-center bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
            Candidates
        </h2>
        <div class="grid md:grid-cols-3 gap-8 mt-8">
            
            <!-- Candidate Card -->
            <div class="bg-white/10 p-6 rounded-xl backdrop-blur-md shadow-lg text-center border border-white/20 hover:scale-105 transition-all duration-300">
                <h3 class="text-2xl font-semibold text-blue-400">John Doe</h3>
                <p class="text-gray-300 mt-2">Party: Liberty Front</p>
                <button class="mt-4 px-6 py-2 text-lg font-medium bg-green-500 hover:bg-green-600 rounded-full transition-all duration-300">
                    Vote
                </button>
            </div>

            <div class="bg-white/10 p-6 rounded-xl backdrop-blur-md shadow-lg text-center border border-white/20 hover:scale-105 transition-all duration-300">
                <h3 class="text-2xl font-semibold text-blue-400">Jane Smith</h3>
                <p class="text-gray-300 mt-2">Party: Progressive Alliance</p>
                <button class="mt-4 px-6 py-2 text-lg font-medium bg-green-500 hover:bg-green-600 rounded-full transition-all duration-300">
                    Vote
                </button>
            </div>

            <div class="bg-white/10 p-6 rounded-xl backdrop-blur-md shadow-lg text-center border border-white/20 hover:scale-105 transition-all duration-300">
                <h3 class="text-2xl font-semibold text-blue-400">Michael Johnson</h3>
                <p class="text-gray-300 mt-2">Party: National Union</p>
                <button class="mt-4 px-6 py-2 text-lg font-medium bg-green-500 hover:bg-green-600 rounded-full transition-all duration-300">
                    Vote
                </button>
            </div>

        </div>
    </section>

    
    <!-- Footer -->
    <footer class="bg-gradient-to-r from-blue-700 to-purple-600 text-white text-center py-5">
        <p>&copy; 2025 BallotBox. All rights reserved.</p>
    </footer>

</body>
</html>
